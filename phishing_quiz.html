<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phishing Awareness Quiz — CodeAlpha Task 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B263B;
    --steel:#415A77;
    --red:#E63946;
    --ice:#E0E7EF;
    --bg:#F4F6F9;
    --card:#FFFFFF;
    --muted:#64748B;
    --good:#1E8E5A;
    --good-bg:#E8F6EE;
    --bad-bg:#FDECEE;
    --radius:14px;
    --shadow: 0 10px 30px rgba(27,38,59,0.10);
  }
  *{box-sizing:border-box;}
  html{-webkit-font-smoothing:antialiased;}
  body{
    margin:0;
    font-family:'Inter', system-ui, sans-serif;
    background:
      radial-gradient(1100px 500px at 85% -10%, rgba(65,90,119,0.14), transparent 60%),
      var(--bg);
    color:var(--navy);
    min-height:100vh;
    padding:32px 20px 64px;
  }
  a{color:inherit;}
  .wrap{max-width:760px;margin:0 auto;}

  /* ---------- Header ---------- */
  header{margin-bottom:28px;}
  .eyebrow{
    display:flex;align-items:center;gap:8px;
    font-size:12.5px;font-weight:600;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--red);margin-bottom:10px;
  }
  .eyebrow svg{width:16px;height:16px;flex:none;}
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(28px, 5vw, 40px);
    line-height:1.08;
    margin:0 0 10px;
    color:var(--navy);
  }
  .sub{color:var(--muted);font-size:15px;line-height:1.5;max-width:56ch;}

  /* ---------- Reel / progress ---------- */
  .reel{
    margin-top:26px;
    display:flex;align-items:center;gap:14px;
  }
  .reel-track{
    position:relative;
    flex:1;height:3px;background:#D7DEE6;border-radius:2px;overflow:visible;
  }
  .reel-fill{
    position:absolute;left:0;top:0;height:100%;
    background:var(--steel);border-radius:2px;
    transition:width .45s cubic-bezier(.65,0,.35,1);
  }
  .hook{
    position:absolute;top:50%;transform:translate(-50%,-50%);
    transition:left .45s cubic-bezier(.65,0,.35,1);
    width:22px;height:22px;
  }
  .reel-label{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;color:var(--muted);white-space:nowrap;
  }
  .caught{
    display:flex;gap:5px;margin-top:12px;
  }
  .catch-dot{
    width:9px;height:9px;border-radius:50%;background:#D7DEE6;transition:background .3s;
  }
  .catch-dot.correct{background:var(--good);}
  .catch-dot.wrong{background:var(--red);}

  /* ---------- Card ---------- */
  .card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:30px;
    margin-top:22px;
    animation:rise .35s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .q-num{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;color:var(--steel);font-weight:500;
    margin-bottom:10px;letter-spacing:0.04em;
  }
  .q-text{
    font-size:18px;font-weight:600;line-height:1.4;margin:0 0 18px;color:var(--navy);
  }

  /* ---------- Scenario mockups ---------- */
  .mock{border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;margin-bottom:20px;}
  .mock-bar{background:#EEF1F5;padding:8px 14px;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.03em;}
  .mock-body{padding:16px 18px;font-size:13.5px;line-height:1.7;}
  .mock-row{display:flex;gap:8px;margin-bottom:2px;}
  .mock-row b{flex:none;color:var(--navy);}
  .mock-flag{color:var(--red);}
  .mock-url{
    font-family:'JetBrains Mono', monospace;font-size:14px;
    background:var(--navy);color:#fff;padding:12px 16px;border-radius:8px;
    word-break:break-all;margin-bottom:20px;
  }
  .mock-url .path{color:#9FB3C8;}
  .mock-sms{
    max-width:280px;background:var(--ice);border-radius:14px 14px 14px 4px;
    padding:12px 14px;font-size:13.5px;line-height:1.55;margin-bottom:20px;color:var(--navy);
  }
  .scenario{
    background:var(--bg);border-left:none;border-radius:10px;
    padding:16px 18px;font-size:14px;line-height:1.65;color:var(--navy);margin-bottom:20px;
  }

  /* ---------- Options ---------- */
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    text-align:left;
    border:1px solid #E2E8F0;background:#fff;
    border-radius:10px;padding:13px 16px;font-size:14.5px;
    font-family:inherit;color:var(--navy);cursor:pointer;
    display:flex;gap:12px;align-items:flex-start;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .opt:hover:not(:disabled){border-color:var(--steel);background:#F7F9FB;}
  .opt:active:not(:disabled){transform:scale(0.997);}
  .opt:focus-visible{outline:2px solid var(--steel);outline-offset:2px;}
  .opt-letter{
    flex:none;width:24px;height:24px;border-radius:50%;
    background:var(--bg);color:var(--steel);font-weight:700;font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--good);background:var(--good-bg);}
  .opt.correct .opt-letter{background:var(--good);color:#fff;}
  .opt.wrong{border-color:var(--red);background:var(--bad-bg);}
  .opt.wrong .opt-letter{background:var(--red);color:#fff;}
  .opt.dim{opacity:0.55;}

  /* ---------- Feedback ---------- */
  .feedback{
    margin-top:18px;padding:16px 18px;border-radius:10px;
    font-size:14px;line-height:1.6;display:none;
  }
  .feedback.show{display:block;animation:rise .25s ease both;}
  .feedback.is-good{background:var(--good-bg);color:#0F5132;}
  .feedback.is-bad{background:var(--bad-bg);color:#7A1F27;}
  .feedback strong{display:block;margin-bottom:4px;font-size:14.5px;}

  .actions{display:flex;justify-content:flex-end;margin-top:20px;}
  .btn{
    font-family:inherit;font-size:14px;font-weight:600;
    background:var(--navy);color:#fff;border:none;border-radius:8px;
    padding:11px 22px;cursor:pointer;transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--steel);}
  .btn:active{transform:scale(0.98);}
  .btn:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
  .btn.secondary{background:transparent;color:var(--steel);border:1px solid #D7DEE6;}
  .btn.secondary:hover{background:#EEF1F5;}

  /* ---------- Results ---------- */
  .results{text-align:center;padding:44px 30px;}
  .results .ring{
    width:120px;height:120px;border-radius:50%;
    margin:0 auto 22px;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:var(--navy);color:#fff;
  }
  .results .ring .score{font-family:'Fraunces',serif;font-size:34px;font-weight:600;}
  .results .ring .of{font-size:11px;color:var(--ice);letter-spacing:.05em;}
  .results h2{font-family:'Fraunces',serif;font-size:26px;margin:0 0 10px;}
  .results p{color:var(--muted);font-size:14.5px;line-height:1.6;max-width:46ch;margin:0 auto 26px;}
  .results .btn{padding:12px 28px;}

  footer{
    text-align:center;margin-top:34px;font-size:12px;color:var(--muted);
  }

  @media (max-width:600px){
    .card{padding:22px 18px;}
    .q-text{font-size:16.5px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12c0-4 3-7 7-7h1a6 6 0 0 1 6 6v3a5 5 0 0 1-5 5c-1.7 0-3-1-3-3v-6"/><circle cx="19" cy="6" r="2"/></svg>
      CodeAlpha Cyber Security &middot; Task 2
    </div>
    <h1>Phishing Awareness Quiz</h1>
    <p class="sub">Ten realistic scenarios. Spot the hook before it spots you — read each one carefully, then pick the best response.</p>

    <div class="reel">
      <div class="reel-track">
        <div class="reel-fill" id="reelFill"></div>
        <svg class="hook" id="hookIcon" viewBox="0 0 24 24" fill="none" stroke="#E63946" stroke-width="2.4" stroke-linecap="round" style="left:0%;">
          <path d="M12 3v9a4 4 0 0 0 4 4c2 0 3.2-1.3 3.2-3"/><circle cx="19.2" cy="13" r="1.6" fill="#E63946" stroke="none"/>
        </svg>
      </div>
      <div class="reel-label" id="reelLabel">Question 1 / 10</div>
    </div>
    <div class="caught" id="caught"></div>
  </header>

  <main id="quizArea"></main>

  <footer>Built for CodeAlpha Cyber Security Internship — Task 2: Phishing Awareness Training</footer>
</div>

<script>
const QUESTIONS = [
  {
    type: "email",
    q: "What's the strongest indicator that this email is a phishing attempt?",
    mock: {
      bar: "New Message",
      rows: [
        ["From", "PayPa1 Security &lt;security@paypa1-alerts-secure.com&gt;", true],
        ["To", "you@example.com", false],
        ["Subject", "URGENT: Your account will be suspended in 24 hours!", true],
      ],
      body: "Dear Customer,<br><br>We detected unusual activity on your account. Verify your identity immediately by clicking below, or your account will be permanently suspended.<br><br><b>[ Verify My Account Now ]</b>"
    },
    options: [
      "The email uses a formal, polite tone",
      "The sender's actual domain is \u201cpaypa1-alerts-secure.com\u201d, not paypal.com",
      "It mentions the word \u201csecurity\u201d in the subject",
      "It includes a clickable button"
    ],
    correct: 1,
    explain: "A mismatched or misspelled sender domain is one of the most reliable phishing signs. The display name can say anything, but the real domain after the @ symbol reveals where the email actually came from."
  },
  {
    type: "url",
    q: "You're asked to log in to \u201cAmazon\u201d after clicking a link. Which address bar shows the real Amazon login page?",
    urlA: "https://amaz0n-account-verify.com/login",
    urlB: "https://www.amazon.com/gp/css/homepage.html",
    options: [
      "The first one — it mentions Amazon in the name",
      "The second one — the domain is exactly amazon.com",
      "Both are legitimate Amazon addresses",
      "Neither can be trusted without more information"
    ],
    correct: 1,
    explain: "Only the exact registered domain matters — everything must match right before the first single slash (amazon.com). \u201cAmaz0n-account-verify.com\u201d is a completely different, attacker-owned domain designed to look similar at a glance."
  },
  {
    type: "sms",
    q: "You receive this text message. What type of phishing attack is this?",
    sms: "USPS: Your package could not be delivered due to an incomplete address. Update your details within 24 hrs: bit.ly/usps-redelivery",
    options: [
      "Vishing (voice phishing)",
      "Whaling (executive-targeted phishing)",
      "Smishing (SMS phishing)",
      "Clone phishing"
    ],
    correct: 2,
    explain: "Phishing delivered via text message is called \u201csmishing.\u201d It typically uses a fake delivery, billing, or account alert with a shortened link to create urgency and hide the real destination."
  },
  {
    type: "scenario",
    scenario: "Your phone rings. The caller says: \u201cThis is IT Support — we've detected a security issue on your laptop. I need your password to fix it right now before you lose access.\u201d",
    q: "What combination of tactics is being used here?",
    options: [
      "Scarcity and curiosity",
      "Authority and urgency (a vishing attempt)",
      "Familiarity and trust-building over time",
      "This is a legitimate, routine IT process"
    ],
    correct: 1,
    explain: "This is a classic voice-phishing (vishing) call. The attacker claims authority (\u201cIT Support\u201d) and manufactures urgency (\u201cright now\u201d) to pressure you into skipping normal verification steps. Legitimate IT staff never need your actual password."
  },
  {
    type: "url",
    q: "A link claims to go to PayPal. The address bar actually shows this. Is it legitimate?",
    urlA: "http://paypal.com.account-verify.ru/signin",
    options: [
      "Yes — it starts with \u201cpaypal.com\u201d",
      "No — the real domain is \u201caccount-verify.ru\u201d, and \u201cpaypal.com\u201d is just a subdomain trick",
      "Yes — it's using http instead of a fake protocol",
      "There's no way to tell from a URL alone"
    ],
    correct: 1,
    explain: "The real (registrable) domain is always the part immediately before the final slash of the domain segment — here that's account-verify.ru. \u201cpaypal.com\u201d is just a subdomain the attacker created; it has no connection to PayPal at all.",
    single: true
  },
  {
    type: "scenario",
    scenario: "You get an email that looks like it's from your CFO: \u201cI need you to wire $50,000 to a new vendor today. This is time-sensitive and confidential — please handle personally, don't discuss with the team.\u201d",
    q: "This is a classic example of whaling / CEO fraud. What should you do?",
    options: [
      "Wire the funds immediately since it's from the CFO and marked urgent",
      "Reply to the email asking the CFO to confirm the details",
      "Verify the request through a separate, known channel — like calling the CFO directly — before taking any action",
      "Forward it to a junior colleague to decide"
    ],
    correct: 2,
    explain: "Never verify a suspicious request by replying to the same email thread or channel it arrived on — if it's spoofed, you're just confirming with the attacker. Always verify high-risk requests (especially financial ones) through an independent, previously-known contact method."
  },
  {
    type: "scenario",
    scenario: "A coworker's email account sends you a file named <code style=\"background:var(--ice);padding:2px 6px;border-radius:4px;\">Invoice_2026.docx.exe</code> with the message \u201cSee attached, need your sign-off ASAP.\u201d",
    q: "What should you do?",
    options: [
      "Open it right away since it came from a real coworker's address",
      "Don't open it — a double extension like .docx.exe is a major red flag; verify with your coworker through another channel first",
      "Forward it straight to the whole team",
      "Rename the file and then open it"
    ],
    correct: 1,
    explain: "A file ending in .docx.exe is not a Word document — it's an executable program disguised with a fake document name. Even if the sender's account looks legitimate, it may be compromised. Always verify unexpected attachments out-of-band before opening."
  },
  {
    type: "scenario",
    scenario: "You get a phone push notification asking you to approve a login — but you aren't currently trying to log in to anything.",
    q: "What does this most likely mean, and what should you do?",
    options: [
      "It's probably nothing — approve it so the notification goes away",
      "Someone else likely has your password and is trying to log in — deny it and change your password immediately",
      "Your phone has a software bug — restart the device",
      "Approve it, then ignore any further notifications"
    ],
    correct: 1,
    explain: "This is called \u201cMFA fatigue\u201d — attackers who've already obtained your password try to log in repeatedly, hoping you'll approve a push notification out of habit or annoyance. Always deny unexpected MFA prompts and change your password right away."
  },
  {
    type: "scenario",
    scenario: "A pop-up caller ID shows \u201cMicrosoft Support\u201d: \u201cWe've detected a dangerous virus on your computer. You must install this remote-access tool immediately or you will lose all your files.\u201d",
    q: "Which social engineering tactics are being combined here?",
    options: [
      "Scarcity and reciprocity",
      "Fear and false authority",
      "Familiarity and curiosity",
      "This is a standard Microsoft support process"
    ],
    correct: 1,
    explain: "This scenario stacks fear (\u201cyou'll lose all your files\u201d) with false authority (claiming to be Microsoft). Microsoft does not make unsolicited calls about viruses on your computer — this is a well-known tech-support scam pattern."
  },
  {
    type: "scenario",
    scenario: "You correctly recognize a suspicious email in your work inbox as a likely phishing attempt.",
    q: "What's the best next step?",
    options: [
      "Just delete it and move on",
      "Reply to the sender letting them know you spotted the scam",
      "Use your organization's \u201cReport Phishing\u201d button (or forward it to your security team), then delete it",
      "Leave it in your inbox in case you need it later"
    ],
    correct: 2,
    explain: "Reporting lets your security team block the sender, warn other employees, and track the campaign — a single report can protect your whole organization. Deleting alone only protects you; replying to the attacker confirms your address is active."
  }
];

let idx = 0, score = 0, answered = false, history = [];

const quizArea = document.getElementById("quizArea");
const reelFill = document.getElementById("reelFill");
const hookIcon = document.getElementById("hookIcon");
const reelLabel = document.getElementById("reelLabel");
const caughtEl = document.getElementById("caught");

function updateReel(){
  const pct = (idx / QUESTIONS.length) * 100;
  reelFill.style.width = pct + "%";
  hookIcon.style.left = pct + "%";
  reelLabel.textContent = idx < QUESTIONS.length
    ? `Question ${idx+1} / ${QUESTIONS.length}`
    : `Complete — ${QUESTIONS.length}/${QUESTIONS.length}`;
  caughtEl.innerHTML = "";
  for(let i=0;i<QUESTIONS.length;i++){
    const dot = document.createElement("div");
    dot.className = "catch-dot" + (history[i]===true?" correct":history[i]===false?" wrong":"");
    caughtEl.appendChild(dot);
  }
}

function renderMock(item){
  if(item.type === "email"){
    const rows = item.mock.rows.map(([label,val,flag]) =>
      `<div class="mock-row"><b>${label}:</b><span class="${flag?'mock-flag':''}">${val}</span></div>`
    ).join("");
    return `<div class="mock">
      <div class="mock-bar">${item.mock.bar}</div>
      <div class="mock-body">${rows}<div style="margin-top:10px;">${item.mock.body}</div></div>
    </div>`;
  }
  if(item.type === "url"){
    if(item.single){
      return `<div class="mock-url">${item.urlA}</div>`;
    }
    return `<div class="mock-url">A&nbsp;&nbsp;${item.urlA}</div><div class="mock-url">B&nbsp;&nbsp;${item.urlB}</div>`;
  }
  if(item.type === "sms"){
    return `<div class="mock-sms">${item.sms}</div>`;
  }
  if(item.type === "scenario"){
    return `<div class="scenario">${item.scenario}</div>`;
  }
  return "";
}

function render(){
  if(idx >= QUESTIONS.length){
    renderResults();
    updateReel();
    return;
  }
  const item = QUESTIONS[idx];
  answered = false;
  const letters = ["A","B","C","D"];

  quizArea.innerHTML = `
    <div class="card">
      <div class="q-num">SCENARIO ${idx+1} OF ${QUESTIONS.length}</div>
      ${renderMock(item)}
      <p class="q-text">${item.q}</p>
      <div class="options" id="opts">
        ${item.options.map((opt,i) => `
          <button class="opt" data-i="${i}">
            <span class="opt-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join("")}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn" id="nextBtn" style="display:none;">${idx===QUESTIONS.length-1 ? "See results" : "Next question"}</button>
      </div>
    </div>
  `;

  const optButtons = quizArea.querySelectorAll(".opt");
  const feedback = document.getElementById("feedback");
  const nextBtn = document.getElementById("nextBtn");

  optButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      if(answered) return;
      answered = true;
      const chosen = parseInt(btn.dataset.i, 10);
      const isCorrect = chosen === item.correct;
      history[idx] = isCorrect;
      if(isCorrect) score++;

      optButtons.forEach(b => {
        const bi = parseInt(b.dataset.i, 10);
        b.disabled = true;
        if(bi === item.correct) b.classList.add("correct");
        else if(bi === chosen) b.classList.add("wrong");
        else b.classList.add("dim");
      });

      feedback.className = "feedback show " + (isCorrect ? "is-good" : "is-bad");
      feedback.innerHTML = `<strong>${isCorrect ? "Correct" : "Not quite"}</strong>${item.explain}`;
      nextBtn.style.display = "inline-block";
      updateReel();
    });
  });

  nextBtn.addEventListener("click", () => {
    idx++;
    render();
  });

  updateReel();
}

function renderResults(){
  const pct = Math.round((score / QUESTIONS.length) * 100);
  let title, msg;
  if(pct >= 90){ title = "Sharp Eye"; msg = "Excellent work — you consistently spotted the red flags attackers rely on people missing. Keep applying this instinct to real messages you receive."; }
  else if(pct >= 70){ title = "Good Instincts"; msg = "You caught most of the warning signs. Review the explanations for any you missed — those are the patterns worth remembering."; }
  else if(pct >= 40){ title = "Getting There"; msg = "You're building awareness, but a few tactics slipped past you. Re-read the explanations below and try the quiz again to lock them in."; }
  else { title = "Time to Recheck the Basics"; msg = "Phishing relies on exactly the gaps this quiz revealed. Revisit the training slides, then retake the quiz — awareness improves fast with practice."; }

  quizArea.innerHTML = `
    <div class="card results">
      <div class="ring"><div class="score">${score}/${QUESTIONS.length}</div><div class="of">SCENARIOS CAUGHT</div></div>
      <h2>${title}</h2>
      <p>${msg}</p>
      <button class="btn" id="retakeBtn">Retake the quiz</button>
    </div>
  `;
  document.getElementById("retakeBtn").addEventListener("click", () => {
    idx = 0; score = 0; history = [];
    render();
  });
}

render();
</script>
</body>
</html>
